builds:
  include:
    - "*.x86_64-linux.*"
    - defaultPackage.x86_64-linux
    - nixosConfigurations.*
    - "checks.aarch64-darwin.macMini1"
    - "checks.aarch64-darwin.macMini2"
  exclude: []

servers:
  - configuration: website-pr-qa
    deployment:
      type: on-pull-request

actions:
  - on: push
    run: backend_specs
    sandboxType: shared-resources
    # Mint a descoped ephemeral GitHub App token so the spec suite's nixpkgs
    # (and other public github:) flake-input fetches authenticate at 5000/hr
    # instead of hitting GitHub's 60/hr anonymous rate limit. nixpkgs is
    # public, so 'descoped' (no repo access, just the rate-limit lift) suffices.
    githubToken: descoped
