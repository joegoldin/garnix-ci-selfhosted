builds:
  include:
    - "*.x86_64-linux.*"
    - defaultPackage.x86_64-linux
    - nixosConfigurations.*
    - "checks.aarch64-darwin.macMini1"
    - "checks.aarch64-darwin.macMini2"
  exclude: []

servers:
  - configuration: website-pr-qa
    deployment:
      type: on-pull-request

actions:
  - on: push
    run: backend_specs
    sandboxType: shared-resources
    # This token authenticates public github: input resolution. The live
    # private-input specs separately decrypt a dedicated, repository-scoped
    # integration-test App credential with this action's private key.
    githubToken: descoped
